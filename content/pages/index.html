title: Welcome
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Nridhya</title>
    <meta name="description" content="Premium Kathak Institute by Lawanya Gupta">
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at 50% 0%, #D10001 0%, #BA0001 80%);
            background-color: #BA0001;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            overflow: hidden;
        }
        
        a.splash-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: #F3CF91; /* Gold logo color */
        }

        .logo-container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
            transition: transform 0.5s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        h1.logo {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin: 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        p.enter-text {
            color: #F3CF91; /* Golden yellow */
            font-family: sans-serif;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 1.5rem;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @media (max-width: 768px) {
            h1.logo { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- Clicking anywhere on the screen navigates to home.html -->
    <a href="home.html" class="splash-link">
        <div class="logo-container">
            <img src="images/logo.png" alt="Nridhya Logo" style="max-width: 400px;">
            <p class="enter-text">Click anywhere to enter</p>
        </div>
    </a>
</body>
</html>
