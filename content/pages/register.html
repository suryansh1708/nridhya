---
title: Register Now
---
<!DOCTYPE html>
<html lang="en">
{{> head}}
<body>
    {{> bg-mesh}}
    {{> nav}}

    <main class="page-content" id="main-content">

        <!-- ===== HERO ===== -->
        <div class="template-hero">
            <div class="template-hero-text">
                <h1 class="page-hero-title">Register<br><span style="color:#fbbf24;">Now</span></h1>
                <p class="subtitle" style="font-size: 1.2rem; margin-bottom: 2rem;">Begin your Kathak journey with Nridhya.</p>
            </div>
            <div class="template-hero-image">
                <picture>
                    <source srcset="images/gallery/IMG_4965.webp" type="image/webp">
                    <img src="images/gallery/IMG_4965.jpg" alt="Register Now" loading="eager" decoding="async">
                </picture>
            </div>
        </div>

        <!-- ===== BATCH DETAILS ===== -->
        <section class="about-section">
          <div class="glass-card" style="text-align:center;">
            <h2 style="font-size:2.2rem;">Batch Details</h2>
            <div style="width:60px; height:3px; background:#fbbf24; margin:0 auto 2rem;"></div>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:2rem;">
              <div class="minimal-card">
                <h3 style="color:#fbbf24; margin-bottom:0.75rem;"><i class="fa-solid fa-sun" style="margin-right:0.5rem;"></i>Morning Batch</h3>
                <p style="font-size:1.1rem;"><strong>Saturday &amp; Sunday</strong></p>
                <p style="font-size:1.1rem;">10:00 AM – 2:00 PM</p>
              </div>
              <div class="minimal-card">
                <h3 style="color:#fbbf24; margin-bottom:0.75rem;"><i class="fa-solid fa-moon" style="margin-right:0.5rem;"></i>Evening Batch</h3>
                <p style="font-size:1.1rem;"><strong>Tuesday &amp; Thursday</strong></p>
                <p style="font-size:1.1rem;">4:00 PM – 7:00 PM</p>
              </div>
            </div>
          </div>
        </section>

        <!-- ===== ABOUT NRIDHYA ===== -->
        {{> institute-block}}

        <!-- ===== CONTACT STRIP ===== -->
        {{> contact-strip}}

    </main>

    {{> footer}}
</body>
</html>
